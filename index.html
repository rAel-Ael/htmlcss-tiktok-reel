<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bool Tok</title>
  <link rel="icon" href="assets/img/booltok_logo.png">


  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">


  <!-- TikTok Sans -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=TikTok+Sans:opsz,wght@12..36,300..900&display=swap"
    rel="stylesheet">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="css/style.css">

</head>

<body>
  <!-- Container della pagina, necessario per via del layout particolare -->
  <div class="reel-page debug">
    <video src="assets/video/coder.mp4" autoplay muted loop></video>

    <!-- Header -->
    <header class="reel-header">

      <nav class="reel-header">
        <i class="bi bi-play-btn" alt="bot"></i>
        <ul class="topscreen">
          <li class="esp pad">Esplora</li>
          <li class="seg pad">Seguiti</li>
          <li class="perte pad">Per te</li>
        </ul>
        <i class="bi bi-search" alt="bot"></i>

    </header>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="logo">
        <img class="boolean" src="assets/img/boolean_logo.png" alt="logo">
      </div>
      <div class="cuore icons">
        <i class="bi bi-heart-fill"></i>
        <p class="icons">588</p>
      </div>
      <div class="chatdots icons">
        <i class="bi bi-chat-dots-fill"></i>
        <p class="icons">13</p>
      </div>
      <div class="mark icons">
        <i class="bi bi-bookmark-fill"></i>
        <p class="icons">638</p>
      </div>
      <div class="toparrow icons">
        <i class="bi bi-sign-turn-slight-right-fill"></i>
        <p class="icons">491</p>
      </div>

    </div>

    <!--
    <div class="text">
      <p>boolean.carrers</p>
      <p>prova il fundamentals Camp. 20 ore di corso
        gratuito per...<strong>Vedi altro</strong>
      </p>
    </div>
    -->


    <!-- Footer -->
    <footer class="navigate">

      <div class="home icon">
        <p></p><i class="bi bi-house-fill"></i></p>
        <p>Home</p>
      </div>
      <div class="amici icon">
        <p></p><i class="bi bi-people"></i></p>
        <p>Amici</p>
      </div>
      <div class="tastocentrale icon">
        <p >
          +
        </p>
      </div>
      <div class="posta icon">
        <p></p><i class="bi bi-chat-square"></i></p>
        <p>Posta</p>
      </div>
      <div class="profilo icon">
        <p></p> <i class="bi bi-person"></i></p>
        <p>Profilo</p>
      </div>

    </footer>
  </div>

</body>

</html>
